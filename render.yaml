services:
  - type: web
    name: task-manager
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: task-manager-db
          property: connectionString

databases:
  - name: task-manager-db
    region: oregon
    plan: free
    databaseName: taskmanager
    user: taskmanager
